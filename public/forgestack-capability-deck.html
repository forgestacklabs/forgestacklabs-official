<script>
/* ============ DATA (parsed from the uploaded manuscript) ============ */
const BOOK_DATA = JSON.parse(document.getElementById('bookData').textContent);
const CH_META = BOOK_DATA.ch_meta;

/* SOURCE_PAGES = the raw, statically-authored manuscript pages (source of truth). */
/* pages = the FINAL, browser-measured/paginated page list actually rendered.     */
/* These are rebuilt any time the available page dimensions change (resize).      */
const SOURCE_PAGES = BOOK_DATA.pages;
let pages = [];
let total = 0;
let chapterStartIndex = {};

/* ============ RENDER PAGE HTML ============ */
function pageHTML(p, sideIdx){
  if(!p) return '';
  if(p.type==='endpaper') return `<div class="endpaper" style="position:absolute;inset:0"></div><span class="page-num">${sideIdx!=null? sideIdx+1 : ''}</span>`;
  if(p.type==='title') return `
    <div class="title-page">
      <div class="mark">FS</div>
      <h1>THE FORGESTACK<br><em style="font-style:normal;color:var(--sage)">BOOK</em></h1>
      <p class="ed">First Edition · 2026 · Forgestack Labs LLP</p>
    </div><span class="page-num">${sideIdx+1}</span>`;
  if(p.type==='divider'){
    const m = CH_META[p.chapter-1];
    return `
    <div class="divider-page">
      <div class="num">${String(p.chapter).padStart(2,'0')}</div>
      <h2>${m.t}${m.sub? `<br><span style="font-style:italic;font-weight:300;font-size:20px;color:var(--muted)">${m.sub}</span>`:''}</h2>
      <span class="time">Est. reading time · ${m.time}</span>
    </div><span class="page-num">${sideIdx+1}</span>`;
  }
  if(p.type==='timeline'){
    return `<div class="special-page"><span class="special-eyebrow">${p.eyebrow||''}</span><h3 class="special-title">${p.title||''}</h3>
      <div class="tl-wrap">${(p.items||[]).map(it=>`
        <div class="tl-item${it.now?' now':''}"><span class="tl-dot"></span><span class="tl-date">${it.date}</span><span class="tl-label">${it.label}</span></div>
      `).join('')}</div>
    </div><span class="page-num">${sideIdx+1}</span>`;
  }
  if(p.type==='diagram'){
    return `<div class="special-page dt-wrap"><span class="special-eyebrow">${p.eyebrow||''}</span><h3 class="special-title">${p.title||''}</h3>
      <div class="dt-grid">${(p.nodes||[]).map((n,i)=>`
        <div class="dt-node" data-i="${i}" onclick="this.classList.toggle('active')"><span class="dt-name">${n.name}</span><span class="dt-desc">${n.desc}</span></div>
      `).join('')}</div>
      <span class="dt-hint">Tap a node to reveal detail</span>
    </div><span class="page-num">${sideIdx+1}</span>`;
  }
  if(p.type==='profile'){
    return `<div class="fp-wrap"><div class="fp-portrait">${p.initials}</div>
      <h3 class="fp-name">${p.name}</h3><span class="fp-role">${p.role}</span>
      <p class="fp-quote">&ldquo;${p.quote}&rdquo;</p>
      <div class="fp-focus">${(p.tags||[]).map(t=>`<span class="fp-tag">${t}</span>`).join('')}</div>
    </div><span class="page-num">${sideIdx+1}</span>`;
  }
  if(p.type==='body'){
    const eyebrow = p.first ? `<span class="eyebrow">Chapter ${String(p.chapter).padStart(2,'0')}</span>` : '';
    return `<div class="body-page">${eyebrow}${p.html}</div><span class="page-num">${sideIdx+1}</span>`;
  }
  return '';
}

/* ============ MEASURED PAGINATION ============
   The manuscript JSON stores body copy as a handful of loosely pre-split
   "body" entries per chapter. Rather than trust that static split (which
   over/under-fills pages depending on viewport & font metrics), we treat
   those entries as a single content stream per chapter, tokenize it into
   block-level pieces, and re-flow it into pages using real DOM measurement
   against an offscreen element that shares the exact page CSS.
*/

/* Split a chapter's combined body HTML into block-level tokens we can
   redistribute across generated pages one at a time. */
function tokenizeBodyHTML(html){
  const re = /<div class="callout">[\s\S]*?<\/div>|<h4>[\s\S]*?<\/h4>|<p>[\s\S]*?<\/p>/g;
  return html.match(re) || [];
}

/* Build a lightweight lowercase search string (mirrors the style of the
   original manuscript's "search" fields) so the in-book search feature
   keeps working against re-paginated content. */
function normalizeSearch(html){
  let text = html.replace(/<[^>]+>/g, ' ');
  text = text.replace(/&ldquo;|&rdquo;/g, 'x');
  text = text.replace(/&amp;/g, '&');
  text = text.replace(/[’‘]/g, "'").replace(/[“”]/g, 'x');
  text = text.toLowerCase();
  text = text.replace(/\s+/g, ' ').trim();
  return text;
}

let measureSlot = null;
let measureBody = null;

/* Create an offscreen element that is pixel-for-pixel identical (same
   classes, same computed size) to the live right-hand page slot, so that
   scrollHeight measurements taken against it reflect exactly what would
   happen in the real book. Must be called only after the book/library is
   visible and #rightPage has real, non-zero rendered dimensions. */
function createMeasureSlot(){
  if(measureSlot){ measureSlot.remove(); measureSlot = null; measureBody = null; }
  const rect = rightPage.getBoundingClientRect();

  measureSlot = document.createElement('div');
  measureSlot.className = 'page-slot right';
  measureSlot.style.position = 'fixed';
  measureSlot.style.top = '0';
  measureSlot.style.left = '-9999px';
  measureSlot.style.visibility = 'hidden';
  measureSlot.style.pointerEvents = 'none';
  measureSlot.style.width = rect.width + 'px';
  measureSlot.style.height = rect.height + 'px';

  measureBody = document.createElement('div');
  measureBody.className = 'body-page';
  measureSlot.appendChild(measureBody);
  document.body.appendChild(measureSlot);
}

function destroyMeasureSlot(){
  if(measureSlot){ measureSlot.remove(); }
  measureSlot = null; measureBody = null;
}

/* Does this combined set of tokens (rendered as a body page, including the
   chapter eyebrow if this is the first generated page of the chapter) fit
   within the real page without overflowing? */
function bodyFits(html, chapter, first){
  const eyebrow = first ? `<span class="eyebrow">Chapter ${String(chapter).padStart(2,'0')}</span>` : '';
  measureBody.innerHTML = eyebrow + html;
  return measureBody.scrollHeight <= measureBody.clientHeight + 1;
}

function makeBodyPage(tokensList, chapter, first){
  const html = tokensList.join('');
  return {
    type: 'body',
    chapter: chapter,
    first: !!first,
    html: html,
    search: normalizeSearch(html)
  };
}

/* Greedily fill pages with tokens, backing a trailing <h4> off a page (so
   it doesn't become an orphan heading with no body beneath it) whenever the
   next token doesn't fit alongside it. */
function paginateChapterTokens(tokens, chapter){
  const result = [];
  let current = [];
  let isFirstPage = true;
  let i = 0;

  function isHeading(tok){ return /^\s*<h4/.test(tok); }

  while(i < tokens.length){
    const tok = tokens[i];
    const trial = current.concat([tok]);

    if(bodyFits(trial.join(''), chapter, isFirstPage)){
      current = trial;
      i++;
      continue;
    }

    if(current.length === 0){
      // A single token is too tall for one page on its own (rare edge case).
      // Place it alone rather than looping forever.
      result.push(makeBodyPage([tok], chapter, isFirstPage));
      isFirstPage = false;
      current = [];
      i++;
      continue;
    }

    if(isHeading(current[current.length - 1])){
      // Don't finalize a page that ends on a heading with nothing under it.
      const heading = current.pop();
      if(current.length > 0){
        result.push(makeBodyPage(current, chapter, isFirstPage));
        isFirstPage = false;
        current = [heading];
      } else {
        // The page would have been just the heading itself — that's fine,
        // give it its own page and let the next token start fresh.
        result.push(makeBodyPage([heading], chapter, isFirstPage));
        isFirstPage = false;
        current = [];
      }
      continue; // retry the same token against the adjusted current page
    }

    result.push(makeBodyPage(current, chapter, isFirstPage));
    isFirstPage = false;
    current = [];
    // do not advance i — retry this token against the fresh page
  }

  if(current.length > 0){
    result.push(makeBodyPage(current, chapter, isFirstPage));
  }
  return result;
}

/* Walk SOURCE_PAGES, keeping non-body pages untouched and re-flowing
   consecutive same-chapter body pages into freshly measured pages. */
function buildMeasuredPages(){
  createMeasureSlot();
  const newPages = [];
  let i = 0;

  while(i < SOURCE_PAGES.length){
    const p = SOURCE_PAGES[i];
    if(p.type !== 'body'){
      newPages.push(p);
      i++;
      continue;
    }
    const chapter = p.chapter;
    let combinedHTML = '';
    while(i < SOURCE_PAGES.length && SOURCE_PAGES[i].type === 'body' && SOURCE_PAGES[i].chapter === chapter){
      combinedHTML += SOURCE_PAGES[i].html;
      i++;
    }
    const tokens = tokenizeBodyHTML(combinedHTML);
    const generated = paginateChapterTokens(tokens, chapter);
    newPages.push(...generated);
  }

  destroyMeasureSlot();
  return newPages;
}

function rebuildChapterStartIndex(){
  chapterStartIndex = {};
  pages.forEach((p,i)=>{ if(p.type==='divider'){ if(!(p.chapter in chapterStartIndex)) chapterStartIndex[p.chapter]=i; } });
}

function paginateBook(){
  pages = buildMeasuredPages();
  total = pages.length;
  rebuildChapterStartIndex();
}

/* ============ STATE ============ */
let idx = 0; // left page index (even)
const bookmarks = new Set();
const leftPage = document.getElementById('leftPage');
const rightPage = document.getElementById('rightPage');
const leafNext = document.getElementById('leafNext');
const leafPrev = document.getElementById('leafPrev');
let animating = false;

function isMobile(){ return window.innerWidth <= 900; }
function pageStep(){ return isMobile() ? 1 : 2; }

function renderStatic(){
  const mobile = isMobile();
  const step = pageStep();
  leftPage.innerHTML = mobile ? '' : pageHTML(pages[idx], idx);
  rightPage.innerHTML = mobile ? pageHTML(pages[idx], idx) : pageHTML(pages[idx+1], idx+1);
  document.getElementById('bookEl').classList.toggle('mobile-has-turned-pages', mobile && idx > 0);
  document.getElementById('progressBar').style.width = ((Math.min(idx + step, total))/total*100).toFixed(1)+'%';
  document.getElementById('bbPage').textContent = mobile
    ? `${idx+1} of ${total}`
    : `${idx+1}–${idx+2} of ${total}`;
  document.getElementById('prevArrow').disabled = idx<=0;
  document.getElementById('bbPrev').disabled = idx<=0;
  document.getElementById('nextArrow').disabled = idx+step>=total;
  document.getElementById('bbNext').disabled = idx+step>=total;
  renderTOC();
}

function easeInOutCubic(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

function animateMobilePage(direction, nextIndex, onDone){
  const next = direction === 'next';
  const leaf = leafNext;
  const frontEl = document.getElementById('leafNextFront');
  const backEl = document.getElementById('leafNextBack');
  const foldShadow = document.getElementById('foldShadowRight');
  const currentHTML = pageHTML(pages[idx], idx);
  const targetHTML = pageHTML(pages[nextIndex], nextIndex);
  const fromDeg = next ? 0 : -180;
  const targetDeg = next ? -180 : 0;
  const frontHTML = next ? currentHTML : targetHTML;
  const backHTML = next ? targetHTML : currentHTML;

  rightPage.innerHTML = next ? targetHTML : currentHTML;
  animateLeaf(leaf, frontEl, backEl, frontHTML, backHTML, fromDeg, targetDeg, foldShadow, 900, ()=>{
    idx = nextIndex;
    renderStatic();
    requestAnimationFrame(()=>{
      leaf.classList.remove('show');
      leaf.style.transform = 'rotateY(0deg)';
      leaf.style.setProperty('--shade','0');
      foldShadow.style.opacity = 0;
      onDone();
    });
  });
}

function animateLeaf(leaf, frontEl, backEl, frontHTML, backHTML, fromDeg, targetDeg, foldShadowEl, duration, onDone){
  frontEl.innerHTML = frontHTML;
  backEl.innerHTML = backHTML;
  leaf.classList.add('show');
  const start = performance.now();
  const span = targetDeg - fromDeg;
  function step(now){
    const t = Math.min(1, (now-start)/duration);
    const eased = easeInOutCubic(t);
    const deg = fromDeg + span*eased;
    const foldProgress = Math.abs(deg)/180; // 0 at flat, 1 at fully turned
    const shadeCurve = Math.sin(Math.min(1,foldProgress*1.15)*Math.PI); // peaks near edge-on (90deg)
    const bow = Math.sin(Math.min(1,foldProgress)*Math.PI) * 0.035;
    leaf.style.transform = `rotateY(${deg}deg) scaleX(${1-bow})`;
    leaf.style.setProperty('--shade', shadeCurve.toFixed(3));
    if(foldShadowEl){
      // cast shadow strongest in the first half of the turn, fading as the leaf clears the spine
      const castOpacity = Math.max(0, 1 - foldProgress*1.6) * 0.9;
      foldShadowEl.style.opacity = castOpacity.toFixed(3);
    }
    if(t<1){ requestAnimationFrame(step); } else { onDone(); }
  }
  requestAnimationFrame(step);
}

function turnNext(){
  const mobile = isMobile();
  const step = pageStep();
  if(animating || idx+step>=total) return;
  animating = true;
  if(mobile){
    animateMobilePage('next', idx + step, ()=>{ animating = false; });
    return;
  }
  const frontHTML = mobile ? pageHTML(pages[idx], idx) : pageHTML(pages[idx+1], idx+1);
  const backHTML = pageHTML(pages[idx+step], idx+step);
  const foldShadow = document.getElementById('foldShadowRight');
  rightPage.innerHTML = pageHTML(pages[idx + step + 1], idx + step + 1);
  animateLeaf(leafNext, document.getElementById('leafNextFront'), document.getElementById('leafNextBack'),
    frontHTML, backHTML, 0, -180, foldShadow, 1500, ()=>{
      leafNext.classList.remove('show');
      leafNext.style.transform = 'rotateY(0deg)';
      leafNext.style.setProperty('--shade','0');
      foldShadow.style.opacity = 0;
      idx += step;
      renderStatic();
      animating = false;
    });
}
function turnPrev(){
  const mobile = isMobile();
  const step = pageStep();
  if(animating || idx<=0) return;
  animating = true;
  if(mobile){
    animateMobilePage('prev', idx - step, ()=>{ animating = false; });
    return;
  }
  const currentLeftHTML = pageHTML(pages[idx], idx);
  const previousLeftHTML = pageHTML(pages[idx-step], idx-step);
  const previousRightHTML = pageHTML(pages[idx - step + 1], idx - step + 1);
  const foldShadow = document.getElementById('foldShadowLeft');
  animateLeaf(leafPrev, document.getElementById('leafPrevFront'), document.getElementById('leafPrevBack'),
    currentLeftHTML, previousRightHTML, 0, 180, foldShadow, 1500, ()=>{
      idx -= step;
      renderStatic();
      requestAnimationFrame(()=>{
        leafPrev.classList.remove('show');
        leafPrev.style.transform = 'rotateY(0deg)';
        leafPrev.style.setProperty('--shade','0');
        foldShadow.style.opacity = 0;
        animating = false;
      });
    });
  leftPage.innerHTML = previousLeftHTML;
}
function jumpTo(pageIndex){
  idx = isMobile() ? Math.max(0, pageIndex) : Math.max(0, pageIndex - (pageIndex%2));
  renderStatic();
}

/* ============ CONTROLS ============ */
document.getElementById('nextArrow').onclick = turnNext;
document.getElementById('prevArrow').onclick = turnPrev;
document.getElementById('bbNext').onclick = turnNext;
document.getElementById('bbPrev').onclick = turnPrev;

let wheelLock = false;
document.getElementById('bookEl').addEventListener('wheel', e=>{
  if(wheelLock) return; wheelLock = true; setTimeout(()=>wheelLock=false, 700);
  if(e.deltaY > 12) turnNext(); else if(e.deltaY < -12) turnPrev();
}, {passive:true});

document.addEventListener('keydown', e=>{
  if(document.getElementById('library').classList.contains('visible')===false) return;
  if(e.key==='ArrowRight') turnNext();
  if(e.key==='ArrowLeft') turnPrev();
  if(e.key==='Escape'){ closeAllPanels(); }
});

/* drag-to-flip (simplified, snap on release) */
function setupDrag(zoneId, leaf, dir){
  const zone = document.getElementById(zoneId);
  const foldShadow = document.getElementById(dir==='next' ? 'foldShadowRight' : 'foldShadowLeft');
  let dragging=false, startX=0, curDeg=0;
  function applyDrag(deg){
    curDeg = deg;
    const foldProgress = Math.abs(deg)/180;
    const shadeCurve = Math.sin(Math.min(1,foldProgress*1.15)*Math.PI);
    const bow = Math.sin(Math.min(1,foldProgress)*Math.PI) * 0.035;
    leaf.style.transform = `rotateY(${deg}deg) scaleX(${1-bow})`;
    leaf.style.setProperty('--shade', shadeCurve.toFixed(3));
    foldShadow.style.opacity = (Math.max(0, 1 - foldProgress*1.6) * 0.9).toFixed(3);
  }
  zone.addEventListener('pointerdown', e=>{
    const mobile = isMobile();
    const step = pageStep();
    if(animating) return;
    if(dir==='next' && idx+step>=total) return;
    if(dir==='prev' && idx<=0) return;
    dragging=true; startX=e.clientX; curDeg=0;
    if(dir==='next'){
      document.getElementById('leafNextFront').innerHTML = mobile ? pageHTML(pages[idx], idx) : pageHTML(pages[idx+1], idx+1);
      document.getElementById('leafNextBack').innerHTML = pageHTML(pages[idx+step], idx+step);
    } else {
      document.getElementById('leafPrevFront').innerHTML = pageHTML(pages[idx], idx);
      document.getElementById('leafPrevBack').innerHTML = mobile ? pageHTML(pages[idx-step], idx-step) : pageHTML(pages[idx-step+1], idx-step+1);
    }
    leaf.classList.add('show');
    if(dir==='next'){
      rightPage.innerHTML = mobile ? pageHTML(pages[idx+step], idx+step) : pageHTML(pages[idx+step+1], idx+step+1);
    }
    if(dir==='prev'){
      if(mobile){
        rightPage.innerHTML = pageHTML(pages[idx-step], idx-step);
      } else {
        leftPage.innerHTML = pageHTML(pages[idx-step], idx-step);
      }
    }
    applyDrag(0);
    zone.setPointerCapture(e.pointerId);
  });
  zone.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const dx = e.clientX - startX;
    const width = leaf.offsetWidth || 300;
    let deg = dir==='next' ? Math.max(-180, Math.min(0, (dx/width)*180)) : Math.max(0, Math.min(180, (dx/width)*180));
    applyDrag(deg);
  });
  zone.addEventListener('pointerup', e=>{
    if(!dragging) return; dragging=false;
    const dx = e.clientX - startX;
    const commit = dir==='next' ? dx < -60 : dx > 60;
    const target = commit ? (dir==='next' ? -180 : 180) : 0;
    animating = true;
    animateLeaf(leaf,
      {innerHTML:''}, {innerHTML:''}, // no-op setters, content already loaded
      leaf.querySelector ? '' : '', '', curDeg, target, foldShadow, Math.max(180, Math.abs(target-curDeg)*3), ()=>{
        if(commit){
          idx += dir==='next' ? pageStep() : -pageStep();
        }
        renderStatic();
        requestAnimationFrame(()=>{
          leaf.classList.remove('show');
          leaf.style.transform='rotateY(0deg)';
          leaf.style.setProperty('--shade','0');
          foldShadow.style.opacity = 0;
          animating = false;
        });
      });
  });
}
setupDrag('dragRight', leafNext, 'next');
setupDrag('dragLeft', leafPrev, 'prev');

/* ============ TOC ============ */
function renderTOC(){
  const list = document.getElementById('tocList');
  list.innerHTML = CH_META.map((m,i)=>{
    const chNum = i+1;
    return `<button class="toc-item ${idx===chapterStartIndex[chNum] || idx+1===chapterStartIndex[chNum] ? 'current':''}" data-ch="${chNum}">
      <span class="n">${String(chNum).padStart(2,'0')}</span>
      <span class="t">${m.t}</span>
      <span class="r">${m.time}</span>
    </button>`;
  }).join('');
  list.querySelectorAll('.toc-item').forEach(btn=>{
    btn.onclick = ()=>{ jumpTo(chapterStartIndex[+btn.dataset.ch]); closeAllPanels(); };
  });
}

function togglePanel(id, btnId){
  const panel = document.getElementById(id);
  const willOpen = !panel.classList.contains('open');
  closeAllPanels();
  if(willOpen){ panel.classList.add('open'); document.getElementById(btnId)?.setAttribute('aria-expanded','true'); }
}
function closeAllPanels(){
  ['tocPanel','searchPanel','bmPanel'].forEach(id=>document.getElementById(id).classList.remove('open'));
  document.getElementById('tocBtn').setAttribute('aria-expanded','false');
}
document.getElementById('tocBtn').onclick = ()=>togglePanel('tocPanel','tocBtn');
document.getElementById('searchBtn').onclick = ()=>{ togglePanel('searchPanel'); document.getElementById('searchInput').focus(); };
document.getElementById('bmBtn').onclick = ()=>{ renderBookmarks(); togglePanel('bmPanel'); };

/* ============ SEARCH ============ */
document.getElementById('searchInput').addEventListener('keydown', e=>{
  if(e.key !== 'Enter') return;
  const q = e.target.value.trim().toLowerCase();
  const res = document.getElementById('searchResult');
  if(!q){ res.textContent=''; return; }
  const found = pages.findIndex(p=>p.search && p.search.includes(q));
  if(found>=0){ res.textContent = `Found on page ${found+1} — jumping there.`; jumpTo(found); setTimeout(closeAllPanels, 500); }
  else res.textContent = 'No matches yet — that chapter may still be in progress.';
});

/* ============ BOOKMARKS ============ */
function renderBookmarks(){
  const list = document.getElementById('bmList');
  if(bookmarks.size===0){ list.innerHTML = '<div class="bm-empty">No bookmarks yet — tap the bookmark icon on any spread to save it.</div>'; return; }
  list.innerHTML = [...bookmarks].sort((a,b)=>a-b).map(pi=>{
    return `<button class="toc-item" data-p="${pi}"><span class="n">•</span><span class="t">Page ${pi+1}</span></button>`;
  }).join('');
  list.querySelectorAll('[data-p]').forEach(btn=>{
    btn.onclick = ()=>{ jumpTo(+btn.dataset.p); closeAllPanels(); };
  });
}
document.getElementById('bmBtn').addEventListener('dblclick', ()=>{
  if(bookmarks.has(idx)) bookmarks.delete(idx); else bookmarks.add(idx);
  showToast(bookmarks.has(idx) ? 'Bookmarked this spread' : 'Bookmark removed');
  renderBookmarks();
});

/* ============ DARK MODE ============ */
document.getElementById('darkBtn').onclick = ()=>{
  document.body.classList.toggle('dark');
  document.getElementById('darkBtn').classList.toggle('active');
};

/* ============ DOWNLOAD / SHARE ============ */
document.getElementById('dlBtn').onclick = ()=> window.print();
document.getElementById('shareBtn').onclick = async ()=>{
  const url = location.href;
  if(navigator.share){ try{ await navigator.share({title:'The Forgestack Book', url}); }catch(e){} }
  else { try{ await navigator.clipboard.writeText(url); showToast('Link copied'); }catch(e){ showToast('Copy this page\'s URL to share'); } }
};

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ============ COVER → LIBRARY ============ */
function openBook(){
  const cover = document.getElementById('coverEl');
  const coverScene = document.getElementById('coverScene');
  const coverWrap = cover.closest('.cover-wrap');
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const mobile = (typeof isMobile === 'function') ? isMobile() : window.innerWidth <= 900;

  if(coverScene.classList.contains('hidden') || cover.classList.contains('opening') || cover.classList.contains('mobile-opening')) return;

  if(mobile){
    if(reduced){
      coverScene.classList.add('hidden');
    } else {
      if(coverWrap) coverWrap.classList.add('mobile-book-opening');
      cover.classList.add('mobile-opening');
      coverScene.classList.add('mobile-closing');
      setTimeout(()=>{ coverScene.classList.add('hidden'); }, 1000);
    }
    setTimeout(()=>{
      document.getElementById('library').classList.add('visible');
      paginateBook();
      renderStatic();
    }, reduced ? 350 : 1050);
    return;
  }

  // desktop — unchanged
  cover.classList.add('opening');
  setTimeout(()=>{
    coverScene.classList.add('hidden');
    document.getElementById('library').classList.add('visible');
    paginateBook();
    renderStatic();
  }, 900);
}
document.getElementById('openBtn').onclick = openBook;
document.getElementById('coverEl').onclick = openBook;
document.getElementById('coverEl').addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' ') openBook(); });

/* ============ particles ============ */
(function(){
  const box = document.getElementById('particles');
  for(let i=0;i<16;i++){
    const s = document.createElement('span');
    s.style.left = Math.random()*100+'vw';
    s.style.animationDelay = (Math.random()*18)+'s';
    s.style.animationDuration = (14+Math.random()*10)+'s';
    box.appendChild(s);
  }
})();

/* Re-paginate on resize (debounced): page dimensions changing means the
   previously measured page breaks may now overflow or leave too much
   empty space, so the whole book must be re-flowed. We try to keep the
   reader on the same chapter after the rebuild. */
let resizeTimer = null;
window.addEventListener('resize', ()=>{
  if(!document.getElementById('library').classList.contains('visible')) return;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{
    const currentChapter = pages[idx] ? pages[idx].chapter : undefined;
    paginateBook();
    if(currentChapter !== undefined && chapterStartIndex[currentChapter] !== undefined){
      idx = chapterStartIndex[currentChapter];
    } else {
      const step = pageStep();
      idx = Math.max(0, Math.min(idx, total - 1));
      idx = idx - (idx % step);
    }
    renderStatic();
  }, 250);
});
</script>
