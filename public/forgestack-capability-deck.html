<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Forgestack Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,440;0,9..144,560;1,9..144,440&family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F6F3EA; --paper-2:#EFEBDF; --ink:#171A11; --ink-soft:#3C4234;
  --muted:#8A9080; --sage:#93AC85; --sage-deep:#5E7752;
  --bg-deep:#12150F; --bg-deep-2:#191D13; --paper-dk:#EFEBDF;
  --spine:rgba(0,0,0,.25);
  --stage-bg:#0D0F0A;
}
body.dark{
  --paper:#1B1F15; --paper-2:#20251A; --ink:#EDEAE0; --ink-soft:#C7CBBC;
  --muted:#79806E; --sage:#9FBB90; --sage-deep:#7C9770;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; background:var(--stage-bg); color:var(--ink);
  font-family:'Inter',system-ui,sans-serif; overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit; cursor:pointer}
:focus-visible{outline:2px solid var(--sage); outline-offset:2px}
.eyebrow{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.2em; text-transform:uppercase}
.vh{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}

/* ============ ambient particles ============ */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5}
.particles span{
  position:absolute; width:3px; height:3px; border-radius:50%;
  background:rgba(147,172,133,.5);
  animation:drift 18s linear infinite;
}
@keyframes drift{ from{transform:translateY(10vh) translateX(0); opacity:0} 10%{opacity:.6} 90%{opacity:.4} to{transform:translateY(-110vh) translateX(30px); opacity:0} }
@media (prefers-reduced-motion:reduce){ .particles span{animation:none; display:none} }

/* ============ COVER SCENE ============ */
#coverScene{
  position:fixed; inset:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(ellipse 1200px 800px at 50% 30%, #1c2116, #0D0F0A 70%);
  transition:opacity 1s ease, visibility 1s;
}
#coverScene.hidden{opacity:0; visibility:hidden; pointer-events:none}
.cover-wrap{ perspective:1800px; text-align:center }
.cover{
  position:relative; width:min(360px,72vw); aspect-ratio:5/7; margin:0 auto 34px;
  border-radius:6px;
  background:
    linear-gradient(155deg, rgba(255,255,255,.05), transparent 40%),
    linear-gradient(200deg,#1E2417,#12150F 70%);
  box-shadow:0 40px 90px rgba(0,0,0,.55), 0 4px 0 rgba(255,255,255,.03) inset;
  border:1px solid rgba(147,172,133,.18);
  transform-style:preserve-3d; transform-origin:left center;
  transition:transform 1.1s cubic-bezier(.6,.05,.2,1);
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  cursor:pointer;
}
.cover.opening{ transform:rotateY(-155deg); }
.cover::before{ /* texture */
  content:""; position:absolute; inset:0; border-radius:6px; opacity:.5;
  background-image:repeating-linear-gradient(115deg, rgba(255,255,255,.015) 0 2px, transparent 2px 5px);
}
.cover::after{ /* sweep */
  content:""; position:absolute; inset:-40%; background:linear-gradient(100deg, transparent 40%, rgba(255,255,255,.10) 50%, transparent 60%);
  animation:sweep 3.2s ease-in-out .4s 1;
}
@keyframes sweep{ 0%{transform:translateX(-60%)} 100%{transform:translateX(60%)} }
.cover-mark{ width:44px;height:44px;border:1.5px solid var(--sage); border-radius:50%; display:flex;align-items:center;justify-content:center; margin-bottom:22px; color:var(--sage); font-family:'IBM Plex Mono',monospace; font-size:13px; }
.cover-title{ font-family:'Fraunces',serif; font-weight:300; font-size:clamp(26px,4.2vw,36px); color:var(--paper); margin:0 0 8px; letter-spacing:-.01em }
.cover-title em{font-style:normal; color:var(--sage); font-weight:560}
.cover-edition{ color:var(--muted); font-size:11.5px; letter-spacing:.2em; text-transform:uppercase; font-family:'IBM Plex Mono',monospace}
.open-btn{
  margin-top:8px; background:transparent; border:1px solid var(--sage); color:var(--sage);
  padding:13px 30px; border-radius:999px; font-family:'IBM Plex Mono',monospace;
  font-size:12px; letter-spacing:.16em; text-transform:uppercase; transition:.25s;
}
.open-btn:hover{ background:var(--sage); color:#0D0F0A }
.cover-hint{ margin-top:16px; color:var(--muted); font-size:12px; }

/* ============ LIBRARY (reading) SHELL ============ */
#library{ position:fixed; inset:0; z-index:10; opacity:0; visibility:hidden; transition:opacity .8s ease .1s, visibility .8s; background:var(--stage-bg); }
#library.visible{ opacity:1; visibility:visible; }

.progress{ position:fixed; top:0; left:0; height:3px; background:var(--sage); z-index:40; transition:width .5s ease; box-shadow:0 0 12px rgba(147,172,133,.6); }

.topbar{
  position:fixed; top:0; left:0; right:0; z-index:30;
  display:flex; justify-content:space-between; align-items:center;
  padding:22px 28px 0;
}
.topbar .grp{ display:flex; gap:8px; align-items:center }
.chip{
  display:flex; align-items:center; gap:8px;
  background:rgba(246,243,234,.06); border:1px solid rgba(246,243,234,.14);
  color:var(--paper); padding:9px 16px; border-radius:999px;
  font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.1em; text-transform:uppercase;
  backdrop-filter:blur(10px); transition:.2s;
}
.chip:hover{ background:rgba(246,243,234,.13) }
.icon-btn{
  width:38px;height:38px; border-radius:50%; border:1px solid rgba(246,243,234,.14);
  background:rgba(246,243,234,.06); color:var(--paper); display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(10px); transition:.2s; position:relative;
}
.icon-btn:hover{ background:rgba(246,243,234,.13) }
.icon-btn.active{ background:var(--sage); color:#0D0F0A; border-color:var(--sage) }
.icon-btn svg{ width:16px;height:16px }

.stage{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; perspective:2600px; }
.book{ position:relative; width:min(920px,92vw); height:min(600px,72vh); }
.book-shadow{
  position:absolute; left:8%; right:8%; bottom:-26px; height:40px; border-radius:50%;
  background:radial-gradient(ellipse, rgba(0,0,0,.55), transparent 72%); filter:blur(4px);
}
.spread{ position:absolute; inset:0; display:flex; box-shadow:0 30px 80px rgba(0,0,0,.5); border-radius:3px; overflow:hidden; }
.page-slot{
  position:relative; width:50%; height:100%; background:var(--paper); overflow:hidden;
  padding:44px 38px; display:flex; flex-direction:column; justify-content:flex-start;
}
.page-slot.left{ border-right:1px solid rgba(0,0,0,.06); background-image:linear-gradient(90deg, rgba(0,0,0,.06), transparent 3%); }
.page-slot.right{ background-image:linear-gradient(270deg, rgba(0,0,0,.06), transparent 3%); }
.page-num{ position:absolute; bottom:16px; font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); }
.page-slot.left .page-num{ left:24px } .page-slot.right .page-num{ right:24px }

.leaf{
  position:absolute; top:0; width:50%; height:100%; transform-style:preserve-3d;
  transition:none; pointer-events:none; display:none; z-index:20;
  --shade:0; --bow:0;
  will-change:transform;
}
.leaf.show{ display:block }
.leaf.next-leaf{ right:0; transform-origin:left center; }
.leaf.prev-leaf{ left:0; transform-origin:right center; }
.leaf-face{ position:absolute; inset:0; backface-visibility:hidden; background:var(--paper); padding:44px 38px; display:flex; flex-direction:column; justify-content:flex-start; box-shadow:0 0 40px rgba(0,0,0,.15) inset; }
.leaf-face.back{ transform:rotateY(180deg); }
/* real element (not a pseudo) so it paints ON TOP of the opaque front/back faces instead of being buried beneath them */
.leaf-shade{ position:absolute; inset:0; backface-visibility:hidden; opacity:var(--shade); pointer-events:none; mix-blend-mode:multiply; }
.leaf.next-leaf .leaf-shade{ background:linear-gradient(90deg, rgba(0,0,0,.55), transparent 62%); }
.leaf.prev-leaf .leaf-shade{ background:linear-gradient(270deg, rgba(0,0,0,.55), transparent 62%); }
/* shadow the lifting page casts onto the spine of the page beneath it */
.page-fold-shadow{ position:absolute; top:0; bottom:0; width:22%; pointer-events:none; z-index:12; opacity:0; }
.page-fold-shadow.right{ left:50%; background:linear-gradient(90deg, rgba(0,0,0,.32), transparent); }
.page-fold-shadow.left{ right:50%; background:linear-gradient(270deg, rgba(0,0,0,.32), transparent); }

@media (prefers-reduced-motion:reduce){ .leaf-shade{ transition:none } }

.arrow{
  position:absolute; top:50%; transform:translateY(-50%); z-index:15;
  width:44px;height:44px;border-radius:50%; border:1px solid rgba(246,243,234,.18);
  background:rgba(13,15,10,.4); color:var(--paper); display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px); transition:.2s;
}
.arrow:hover{ background:var(--sage); color:#0D0F0A }
.arrow:disabled{ opacity:.25; pointer-events:none }
.arrow.prev{ left:-58px } .arrow.next{ right:-58px }
@media (max-width:900px){ .arrow.prev{left:6px} .arrow.next{right:6px} }

.dragzone{ position:absolute; top:0; bottom:0; width:70px; z-index:22; cursor:grab; }
.dragzone.right{ right:0 } .dragzone.left{ left:0 }

.bottombar{
  position:fixed; bottom:0; left:0; right:0; z-index:30; display:flex; justify-content:center; align-items:center; gap:26px;
  padding:0 0 26px;
}
.bb-btn{ background:transparent; border:none; color:var(--paper); opacity:.85; display:flex; align-items:center; gap:8px; font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.1em; }
.bb-btn:disabled{ opacity:.25; pointer-events:none }
.bb-page{ font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--muted); min-width:90px; text-align:center; }

/* ============ Chapter 1 content tokens ============ */
.title-page{ min-height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center }
.title-page .mark{ width:40px;height:40px;border:1.5px solid var(--sage-deep); border-radius:50%; margin:0 auto 22px; display:flex; align-items:center; justify-content:center; color:var(--sage-deep); font-family:'IBM Plex Mono',monospace; font-size:12px }
.title-page h1{ font-family:'Fraunces',serif; font-weight:300; font-size:32px; margin:0 0 6px; color:var(--ink) }
.title-page .ed{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted)}

.divider-page{ min-height:100%; display:flex; flex-direction:column; justify-content:center; text-align:left }
.divider-page .num{ font-family:'Fraunces',serif; font-weight:300; font-size:70px; color:var(--sage-deep); line-height:1; margin-bottom:18px }
.divider-page h2{ font-family:'Fraunces',serif; font-weight:400; font-size:32px; line-height:1.12; margin:0 0 18px; color:var(--ink) }
.divider-page .time{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:0; display:block }
.divider-page .soon{ font-style:italic; color:var(--muted); font-size:14px; line-height:1.6 }

.body-page{ width:100%; max-height:100%; overflow-y:auto; overflow-x:hidden; padding-top:4px; padding-right:6px; scrollbar-width:thin; scrollbar-color:rgba(147,172,133,.45) transparent }
.body-page::-webkit-scrollbar{ width:4px }
.body-page::-webkit-scrollbar-track{ background:transparent }
.body-page::-webkit-scrollbar-thumb{ background:rgba(147,172,133,.45); border-radius:999px }
.body-page .lede{ font-family:'Fraunces',serif; font-size:18px; line-height:1.5; color:var(--ink); margin:0 0 16px }
.body-page h4{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--sage-deep); margin:20px 0 8px; }
.body-page h4:first-child{ margin-top:0 }
.body-page p{ font-size:13.5px; line-height:1.68; color:var(--ink-soft); margin:0 0 12px }
.body-page .eyebrow{ color:var(--sage-deep); display:block; margin-bottom:12px }
.callout{ position:relative; padding:22px 20px; margin:18px 0; }
.callout::before,.callout::after{ content:""; position:absolute; width:16px;height:16px; border:1.3px solid var(--sage-deep); }
.callout::before{ top:0;left:0;border-right:none;border-bottom:none } .callout::after{ bottom:0;right:0;border-left:none;border-top:none }
.callout p{ text-align:center; font-family:'Fraunces',serif; font-style:italic; font-size:16px; color:var(--ink); margin:0 }
.promise-box{ background:var(--bg-deep); color:var(--paper); border-radius:10px; padding:24px 22px; }
.promise-box p{ color:#B7BEA9; font-size:13px; }
.promise-box .lede{ color:var(--paper) }
.endpaper{ background-image:repeating-linear-gradient(115deg, rgba(0,0,0,.02) 0 2px, transparent 2px 6px); }

/* ============ floating panels ============ */
.panel{
  position:fixed; z-index:45; background:rgba(20,23,15,.85); backdrop-filter:blur(20px);
  border:1px solid rgba(246,243,234,.12); border-radius:16px; color:var(--paper);
  box-shadow:0 30px 60px rgba(0,0,0,.5); opacity:0; visibility:hidden; transform:translateY(8px);
  transition:.25s ease;
}
.panel.open{ opacity:1; visibility:visible; transform:translateY(0) }
#tocPanel{ top:76px; left:28px; width:320px; max-height:70vh; overflow:auto; padding:18px; }
#tocPanel h3{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin:0 0 12px; padding:0 6px }
.toc-item{ display:flex; align-items:center; gap:12px; width:100%; text-align:left; background:none; border:none; color:var(--paper); padding:10px 8px; border-radius:8px; }
.toc-item:hover, .toc-item.current{ background:rgba(147,172,133,.14) }
.toc-item .n{ font-family:'Fraunces',serif; color:var(--sage); width:26px; flex:none; font-size:16px }
.toc-item .t{ flex:1; font-size:13.5px }
.toc-item .r{ font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted) }

#searchPanel{ top:76px; right:28px; width:280px; padding:14px; }
#searchPanel input{ width:100%; background:rgba(246,243,234,.08); border:1px solid rgba(246,243,234,.16); border-radius:8px; padding:10px 12px; color:var(--paper); font-family:'Inter'; font-size:13px; }
.search-result{ margin-top:10px; font-size:12px; color:var(--muted); }

#bmPanel{ top:76px; right:78px; width:260px; padding:14px; }
.bm-empty{ font-size:12.5px; color:var(--muted); padding:6px }

.toast{ position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--sage); color:#0D0F0A; padding:10px 18px; border-radius:999px; font-family:'IBM Plex Mono',monospace; font-size:12px; z-index:60; opacity:0; transition:.3s; pointer-events:none }
.toast.show{ opacity:1 }

@media (max-width:900px){
  body{ overflow:hidden }
  .cover{ width:min(300px,78vw) }
  .cover-title{ font-size:clamp(24px,8vw,32px) }
  .topbar{
    padding:14px 12px 0;
    gap:10px;
  }
  .topbar .grp{ gap:6px; flex-wrap:wrap }
  .chip{
    padding:8px 11px;
    font-size:10px;
    letter-spacing:.08em;
  }
  .icon-btn{
    width:34px;
    height:34px;
  }
  .stage{
    align-items:flex-start;
    padding:84px 12px 76px;
  }
  .book{
    width:100%;
    height:calc(100dvh - 170px);
    min-height:430px;
    max-height:680px;
  }
  .spread{ border-radius:14px }
  .page-slot.left{ display:none }
  .page-slot.right{
    width:100%;
    border-right:none;
    padding:34px 24px 44px;
    justify-content:flex-start;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  .page-slot.right.mobile-slide{
    overflow:hidden;
  }
  .mobile-slide-out-left{ animation:mobileSlideOutLeft .34s cubic-bezier(.32,.72,.18,1) forwards; }
  .mobile-slide-in-right{ animation:mobileSlideInRight .34s cubic-bezier(.32,.72,.18,1) forwards; }
  .mobile-slide-out-right{ animation:mobileSlideOutRight .34s cubic-bezier(.32,.72,.18,1) forwards; }
  .mobile-slide-in-left{ animation:mobileSlideInLeft .34s cubic-bezier(.32,.72,.18,1) forwards; }
  @keyframes mobileSlideOutLeft{ to{ opacity:0; transform:translateX(-18px); } }
  @keyframes mobileSlideInRight{ from{ opacity:0; transform:translateX(22px); } to{ opacity:1; transform:translateX(0); } }
  @keyframes mobileSlideOutRight{ to{ opacity:0; transform:translateX(18px); } }
  @keyframes mobileSlideInLeft{ from{ opacity:0; transform:translateX(-22px); } to{ opacity:1; transform:translateX(0); } }
  .leaf.next-leaf, .leaf.prev-leaf{ width:100% }
  .leaf-face{
    padding:34px 24px 44px;
    justify-content:flex-start;
    overflow:hidden;
  }
  .arrow{
    width:38px;
    height:38px;
    z-index:32;
    background:rgba(13,15,10,.62);
  }
  .arrow.prev{ left:10px }
  .arrow.next{ right:10px }
  .dragzone{
    width:34px;
    z-index:14;
  }
  .bottombar{
    padding:0 12px 16px;
    gap:12px;
  }
  .bb-btn{
    font-size:10px;
    letter-spacing:.06em;
  }
  .bb-page{
    min-width:70px;
    font-size:10px;
  }
  .title-page h1{ font-size:28px }
  .divider-page .num{ font-size:48px }
  .divider-page h2{ font-size:24px }
  .divider-page h2 span{ font-size:17px !important }
  .body-page .lede{ font-size:17px }
  .body-page p{ font-size:13px; line-height:1.65 }
  .callout{ padding:18px 16px }
  .promise-box{ padding:20px 18px }
  #tocPanel{ left:14px; right:14px; width:auto }
  #searchPanel{ right:14px; width:auto; left:14px }
  #bmPanel{ right:14px; left:14px; width:auto }
}

/* ============ SPECIAL PAGE TEMPLATES: TIMELINE / DIAGRAM / PROFILE ============ */
.special-page{ height:100%; display:flex; flex-direction:column; justify-content:center; }
.special-eyebrow{ font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--sage-deep); margin-bottom:18px; }
.special-title{ font-family:'Fraunces',serif; font-weight:400; font-size:22px; color:var(--ink); margin:0 0 22px; line-height:1.2 }

/* Timeline (Ch.3) */
.tl-wrap{ position:relative; padding-left:26px; }
.tl-wrap::before{ content:""; position:absolute; left:6px; top:4px; bottom:4px; width:1.5px; background:linear-gradient(var(--sage-deep), var(--muted)); opacity:.4 }
.tl-item{ position:relative; padding-bottom:22px; opacity:0; transform:translateX(-8px); animation:tlIn .6s ease forwards; }
.tl-item:nth-child(1){animation-delay:.05s} .tl-item:nth-child(2){animation-delay:.2s} .tl-item:nth-child(3){animation-delay:.35s}
.tl-item:nth-child(4){animation-delay:.5s} .tl-item:nth-child(5){animation-delay:.65s}
@keyframes tlIn{ to{opacity:1; transform:translateX(0)} }
.tl-dot{ position:absolute; left:-26px; top:3px; width:11px; height:11px; border-radius:50%; background:var(--paper); border:2px solid var(--sage-deep); }
.tl-item.now .tl-dot{ background:var(--sage-deep); box-shadow:0 0 0 4px rgba(94,119,82,.18) }
.tl-date{ font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--sage-deep); display:block; margin-bottom:3px }
.tl-label{ font-family:'Fraunces',serif; font-size:15px; color:var(--ink); }
@media (prefers-reduced-motion:reduce){ .tl-item{animation:none; opacity:1; transform:none} }

/* Digital-twin diagram (Ch.8) */
.dt-wrap{ position:relative; }
.dt-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px; }
.dt-node{
  border:1px solid rgba(94,119,82,.35); border-radius:10px; padding:12px 12px;
  background:rgba(147,172,133,.06); cursor:pointer; transition:.25s;
  font-family:'IBM Plex Mono',monospace;
}
.dt-node:hover, .dt-node.active{ background:rgba(147,172,133,.16); border-color:var(--sage-deep); transform:translateY(-2px); }
.dt-node .dt-name{ font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--sage-deep); display:block; margin-bottom:4px }
.dt-node .dt-desc{ font-family:'Inter'; font-size:12px; color:var(--ink-soft); line-height:1.5; display:none }
.dt-node.active .dt-desc{ display:block }
.dt-hint{ font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted); margin-top:14px; letter-spacing:.06em }

/* Founder profile (Ch.15) */
.fp-wrap{ height:100%; display:flex; flex-direction:column; justify-content:center; }
.fp-portrait{
  width:74px; height:74px; border-radius:50%; margin-bottom:16px;
  background:linear-gradient(155deg, var(--sage), var(--sage-deep));
  display:flex; align-items:center; justify-content:center;
  font-family:'Fraunces',serif; font-size:24px; color:#fff; letter-spacing:.02em;
}
.fp-name{ font-family:'Fraunces',serif; font-size:24px; color:var(--ink); margin:0 0 2px }
.fp-role{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--sage-deep); margin-bottom:16px; display:block }

usinesses continue to rely on disconnected systems, manual processes, spreadsheets, notebooks, and repetitive tasks that consume valuable time and create unnecessary uncertainty.</p><p>Operations become more complex as businesses grow.</p><p>Information becomes fragmented.</p><p>Teams work harder than they should.</p><p>Owners make critical decisions without complete visibility.</p><p>The problem isn't the people.</p>", "search": " every business has a story.  ours began with a simple observation.  despite remarkable advances in technology, many businesses continue to rely on disconnected systems, manual processes, spreadsheets, notebooks, and repetitive tasks that consume valuable time and create unnecessary uncertainty.  operations become more complex as businesses grow.  information becomes fragmented.  teams work harder than they should.  owners make critical decisions without complete visibility.  the problem isn't the people. "}, {"type": "body", "chapter": 2, "first": false, "html": "<p>The problem is the systems they depend on.</p><p>At ForgeStack Labs, we believe businesses shouldn't have to adapt to software.</p><p>Software should adapt to businesses.</p><p>That belief became the foundation of everything we build.</p><h4>The First Problem We Chose To Solve</h4><p>Our journey began close to home.</p><p>Growing up around our family's fuel station, we witnessed the operational challenges that thousands of independent fuel retailers experience every single day.</p><p>Shift handovers recorded on paper.</p><p>Inventory reconciled manually.</p>", "search": " the problem is the systems they depend on.  at forgestack labs, we believe businesses shouldn't have to adapt to software.  software should adapt to businesses.  that belief became the foundation of everything we build.  the first problem we chose to solve  our journey began close to home.  growing up around our family's fuel station, we witnessed the operational challenges that thousands of independent fuel  to build with forgestack labs"}, {"type": "body", "chapter": 18, "first": false, "html": "<h4>ForgeStack Labs</h4><p>Engineering Operational Confidence.</p><h4>Mangaluru \u2022 India</h4><h4>www.forgestacklabs.com</h4><h4>contact@forgestacklabs.com</h4>", "search": " forgestack labs engineering operational confidence mangaluru india www.forgestacklabs.com contact@forgestacklabs.com"}, {"type": "endpaper", "search": ""}, {"type": "endpaper", "search": ""}], "ch_meta": [{"t": "When Vision Meets Precision", "sub": "Engineering Operational Confidence", "time": "2 min"}, {"t": "Why ForgeStack Exists", "sub": "We Didn't Start With Software.", "time": "3 min"}, {"t": "Our Story", "sub": "Three Friends. One Conversation. One Commitment.", "time": "4 min"}, {"t": "The ForgeStack Philosophy", "sub": "We Don't Build Software.", "time": "4 min"}, {"t": "Why ForgeStack", "sub": "Every Company Can Build Software.", "time": "4 min"}, {"t": "Our Capabilities", "sub": "Engineering Systems That Power Modern Businesses", "time": "4 min"}, {"t": "Operational Software", "sub": "The Invisible Engine Behind Every Successful Business", "time": "4 min"}, {"t": "Fuel OS", "sub": "Engineering The Operating System For Modern Fuel Retail", "time": "5 min"}, {"t": "Engineering Enterprise Platforms", "sub": "Every Business Deserves Software Built Around Its Reality", "time": "4 min"}, {"t": "Engineering Principles", "sub": "Every Great Product Is Built Long Before The First Line Of Code.", "time": "4 min"}, {"t": "Architecture & Technology", "sub": "Engineering Foundations That Scale With Business", "time": "4 min"}, {"t": "The ForgeStack Delivery Framework", "sub": "Building Great Software Is A Journey, Not A Single Milestone", "time": "4 min"}, {"t": "Security & Reliability", "sub": "Trust Is Engineered.", "time": "4 min"}, {"t": "Research & Innovation", "sub": "Every Great Product Begins With Curiosity", "time": "3 min"}, {"t": "The People Behind ForgeStack", "sub": "Every Great Company Begin <body>

<div class="particles" id="particles"></div>

<!-- ============ COVER ============ -->

</section>

<!-- ============ LIBRARY ============ -->
<section id="library" aria-label="Reading view">
  <div class="progress" id="progressBar" style="width:0%"></div>

  <div class="topbar">

      <button class="chip" id="tocBtn" aria-haspopup="true" aria-expanded="false">☰ Contents</button>

      <button class="icon-btn" id="dlBtn" aria-label="Print or save as PDF" title="Print / Save PDF">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v3a1 1 0 001 1h14a1 1 0 001-1v-3"/></svg>
      </button>
      <button class="icon-btn" id="shareBtn" aria-label="Share" title="Share">

      </button>

  <div class="bottombar">

    <span class="bb-page" id="bbPage">1–2 of 26</span>

  </div>

  <!-- TOC -->

  <!-- Search -->

    <div class="search-result" id="searchResult"></div>

  <!-- Bookmarks -->

  </div>

  <div class="toast" id="toast"></div>
</section>

<script>
/* ============ DATA (parsed from the uploaded manuscript) ============ */
const BOOK_DATA = JSON.parse(document.getElementById('bookData').textContent);
const CH_META = BOOK_DATA.ch_meta;
const pages = BOOK_DATA.pages;

const chapterStartIndex = {};
pages.forEach((p,i)=>{ if(p.type==='divider'){ if(!(p.chapter in chapterStartIndex)) chapterStartIndex[p.chapter]=i; } });

/* ============ RENDER PAGE HTML ============ */
function pageHTML(p, sideIdx){
  if(!p) return '';
  if(p.type==='endpaper') return `<div class="endpaper" style="position:absolute;inset:0"></div><span class="page-num">${sideIdx!=null? sideIdx+1 : ''}</span>`;
  if(p.type==='title') return `
    <div class="title-page">
      <div class="mark">FS</div>
      <h1>THE FORGESTACK<br><em style="font-style:normal;color:var(--sage)">BOOK</em></h1>
      <p class="ed">First Edition · 2026 · Forgestack Labs LLP</p>
    </div><span class="page-num">${sideIdx+1}</span>`;
  if(p.type==='divider'){
    const m = CH_META[p.chapter-1];
    return `
    <div class="divider-page">
      <div class="num">${String(p.chapter).padStart(2,'0')}</div>
      <h2>${m.t}${m.sub? `<br><span style="font-style:italic;font-weight:300;font-size:20px;color:var(--muted)">${m.sub}</span>`:''}</h2>
      <span class="time">Est. reading time · ${m.time}</span>
    </div><span class="page-num">${sideIdx+1}</span>`;
  }
  if(p.type==='timeline'){
    return `<div class="special-page"><span class="special-eyebrow">${p.eyebrow||''}</span><h3 class="special-title">${p.title||''}</h3>
      <div class="tl-wrap">${(p.items||[]).map(it=>`
        <div class="tl-item${it.now?' now':''}"><span class="tl-dot"></span><span class="tl-date">${it.date}</span><span class="tl-label">${it.label}</span></div>
      `).join('')}</div>
    </div><span class="page-num">${sideIdx+1}</span>`;
  }
  if(p.type==='diagram'){
    return `<div class="special-page dt-wrap"><span class="special-eyebrow">${p.eyebrow||''}</span><h3 class="special-title">${p.title||''}</h3>
      <div class="dt-grid">${(p.nodes||[]).map((n,i)=>`
        <div class="dt-node" data-i="${i}" onclick="this.classList.toggle('active')"><span class="dt-name">${n.name}</span><span class="dt-desc">${n.desc}</span></div>
      `).join('')}</div>
      <span class="dt-hint">Tap a node to reveal detail</span>
    </div><span class="page-num">${sideIdx+1}</span>`;
  }
  if(p.type==='profile'){
    return `<div class="fp-wrap"><div class="fp-portrait">${p.initials}</div>
      <h3 class="fp-name">${p.name}</h3><span class="fp-role">${p.role}</span>
      <p class="fp-quote">&ldquo;${p.quote}&rdquo;</p>
      <div class="fp-focus">${(p.tags||[]).map(t=>`<span class="fp-tag">${t}</span>`).join('')}</div>
    </div><span class="page-num">${sideIdx+1}</span>`;
  }
  if(p.type==='body'){
    const eyebrow = p.first ? `<span class="eyebrow">Chapter ${String(p.chapter).padStart(2,'0')}</span>` : '';
    return `<div class="body-page">${eyebrow}${p.html}</div><span class="page-num">${sideIdx+1}</span>`;
  }
  return '';
}

/* ============ STATE ============ */
let idx = 0; // left page index (even)
const total = pages.length;
const bookmarks = new Set();
const leftPage = document.getElementById('leftPage');
const rightPage = document.getElementById('rightPage');
const leafNext = document.getElementById('leafNext');
const leafPrev = document.getElementById('leafPrev');
let animating = false;

function isMobile(){ return window.innerWidth <= 900; }
function pageStep(){ return isMobile() ? 1 : 2; }

function renderStatic(){
  const mobile = isMobile();
  const step = pageStep();
  leftPage.innerHTML = mobile ? '' : pageHTML(pages[idx], idx);
  rightPage.innerHTML = mobile ? pageHTML(pages[idx], idx) : pageHTML(pages[idx+1], idx+1);
  document.getElementById('progressBar').style.width = ((Math.min(idx + step, total))/total*100).toFixed(1)+'%';
  document.getElementById('bbPage').textContent = mobile
    ? `${idx+1} of ${total}`
    : `${idx+1}–${idx+2} of ${total}`;
  document.getElementById('prevArrow').disabled = idx<=0;
  document.getElementById('bbPrev').disabled = idx<=0;
  document.getElementById('nextArrow').disabled = idx+step>=total;
  document.getElementById('bbNext').disabled = idx+step>=total;
  renderTOC();
}

function easeInOutCubic(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

function animateMobilePage(direction, nextIndex, onDone){
  const outClass = direction === 'next' ? 'mobile-slide-out-left' : 'mobile-slide-out-right';
  const inClass = direction === 'next' ? 'mobile-slide-in-right' : 'mobile-slide-in-left';
  rightPage.classList.add('mobile-slide', outClass);
  setTimeout(()=>{
    idx = nextIndex;
    renderStatic();
    rightPage.classList.remove(outClass);
    rightPage.classList.add(inClass);
    setTimeout(()=>{
      rightPage.classList.remove('mobile-slide', inClass);
      onDone();
    }, 360);
  }, 220);
}

function animateLeaf(leaf, frontEl, backEl, frontHTML, backHTML, fromDeg, targetDeg, foldShadowEl, duration, onDone){
  frontEl.innerHTML = frontHTML;
  backEl.innerHTML = backHTML;
  leaf.classList.add('show');
  const start = performance.now();
  const span = targetDeg - fromDeg;
  function step(now){
    const t = Math.min(1, (now-start)/duration);
    const eased = easeInOutCubic(t);
    const deg = fromDeg + span*eased;
    const foldProgress = Math.abs(deg)/180; // 0 at flat, 1 at fully turned
    const shadeCurve = Math.sin(Math.min(1,foldProgress*1.15)*Math.PI); // peaks near edge-on (90deg)
    const bow = Math.sin(Math.min(1,foldProgress)*Math.PI) * 0.035;
    leaf.style.transform = `rotateY(${deg}deg) scaleX(${1-bow})`;
    leaf.style.setProperty('--shade', shadeCurve.toFixed(3));
    if(foldShadowEl){
      // cast shadow strongest in the first half of the turn, fading as the leaf clears the spine
      const castOpacity = Math.max(0, 1 - foldProgress*1.6) * 0.9;
      foldShadowEl.style.opacity = castOpacity.toFixed(3);
    }
    if(t<1){ requestAnimationFrame(step); } else { onDone(); }
  }
  requestAnimationFrame(step);
}

function turnNext(){
  const mobile = isMobile();
  const step = pageStep();
  if(animating || idx+step>=total) return;
  animating = true;
  if(mobile){
    animateMobilePage('next', idx + step, ()=>{ animating = false; });
    return;
  }
  const frontHTML = mobile ? pageHTML(pages[idx], idx) : pageHTML(pages[idx+1], idx+1);
  const backHTML = pageHTML(pages[idx+step], idx+step);
  const foldShadow = document.getElementById('foldShadowRight');
  rightPage.innerHTML = pageHTML(pages[idx + step + 1], idx + step + 1);
  animateLeaf(leafNext, document.getElementById('leafNextFront'), document.getElementById('leafNextBack'),
    frontHTML, backHTML, 0, -180, foldShadow, 1500, ()=>{
      leafNext.classList.remove('show');
      leafNext.style.transform = 'rotateY(0deg)';
      leafNext.style.setProperty('--shade','0');
      foldShadow.style.opacity = 0;
      idx += step;
      renderStatic();
      animating = false;
    });
}
function turnPrev(){
  const mobile = isMobile();
  const step = pageStep();
  if(animating || idx<=0) return;
  animating = true;
  if(mobile){
    animateMobilePage('prev', idx - step, ()=>{ animating = false; });
    return;
  }
  const backHTML = pageHTML(pages[idx], idx);
  const frontHTML = pageHTML(pages[idx-step], idx-step);
  const foldShadow = document.getElementById('foldShadowLeft');
  leftPage.innerHTML = frontHTML;
  rightPage.innerHTML = pageHTML(pages[idx - step + 1], idx - step + 1);
  animateLeaf(leafPrev, document.getElementById('leafPrevFront'), document.getElementById('leafPrevBack'),
    frontHTML, backHTML, 0, 180, foldShadow, 1500, ()=>{
      leafPrev.classList.remove('show');
      leafPrev.style.transform = 'rotateY(0deg)';
      leafPrev.style.setProperty('--shade','0');
      foldShadow.style.opacity = 0;
      idx -= step;
      renderStatic();
      animating = false;
    });
}
function jumpTo(pageIndex){
  idx = isMobile() ? Math.max(0, pageIndex) : Math.max(0, pageIndex - (pageIndex%2));
  renderStatic();
}

/* ============ CONTROLS ============ */
document.getElementById('nextArrow').onclick = turnNext;
document.getElementById('prevArrow').onclick = turnPrev;
document.getElementById('bbNext').onclick = turnNext;
document.getElementById('bbPrev').onclick = turnPrev;

let wheelLock = false;
document.getElementById('bookEl').addEventListener('wheel', e=>{
  if(wheelLock) return; wheelLock = true; setTimeout(()=>wheelLock=false, 700);
  if(e.deltaY > 12) turnNext(); else if(e.deltaY < -12) turnPrev();
}, {passive:true});

document.addEventListener('keydown', e=>{
  if(document.getElementById('library').classList.contains('visible')===false) return;
  if(e.key==='ArrowRight') turnNext();
  if(e.key==='ArrowLeft') turnPrev();
  if(e.key==='Escape'){ closeAllPanels(); }
});

/* drag-to-flip (simplified, snap on release) */
function setupDrag(zoneId, leaf, dir){
  const zone = document.getElementById(zoneId);
  const foldShadow = document.getElementById(dir==='next' ? 'foldShadowRight' : 'foldShadowLeft');
  let dragging=false, startX=0, curDeg=0;
  function applyDrag(deg){
    curDeg = deg;
    const foldProgress = Math.abs(deg)/180;
    const shadeCurve = Math.sin(Math.min(1,foldProgress*1.15)*Math.PI);
    const bow = Math.sin(Math.min(1,foldProgress)*Math.PI) * 0.035;
    leaf.style.transform = `rotateY(${deg}deg) scaleX(${1-bow})`;
    leaf.style.setProperty('--shade', shadeCurve.toFixed(3));
    foldShadow.style.opacity = (Math.max(0, 1 - foldProgress*1.6) * 0.9).toFixed(3);
  }
  zone.addEventListener('pointerdown', e=>{
    const mobile = isMobile();
    const step = pageStep();
    if(animating) return;
    if(dir==='next' && idx+step>=total) return;
    if(dir==='prev' && idx<=0) return;
    dragging=true; startX=e.clientX; curDeg=0;
    if(dir==='next'){
      document.getElementById('leafNextFront').innerHTML = mobile ? pageHTML(pages[idx], idx) : pageHTML(pages[idx+1], idx+1);
      document.getElementById('leafNextBack').innerHTML = pageHTML(pages[idx+step], idx+step);
    } else {
      document.getElementById('leafPrevBack').innerHTML = pageHTML(pages[idx], idx);
      document.getElementById('leafPrevFront').innerHTML = pageHTML(pages[idx-step], idx-step);
    }
    leaf.classList.add('show');
    applyDrag(0);
    zone.setPointerCapture(e.pointerId);
  });
  zone.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const dx = e.clientX - startX;
    const width = leaf.offsetWidth || 300;
    let deg = dir==='next' ? Math.max(-180, Math.min(0, (dx/width)*180)) : Math.max(0, Math.min(180, (dx/width)*180));
    applyDrag(deg);
  });
  zone.addEventListener('pointerup', e=>{
    if(!dragging) return; dragging=false;
    const dx = e.clientX - startX;
    const commit = dir==='next' ? dx < -60 : dx > 60;
    const target = commit ? (dir==='next' ? -180 : 180) : 0;
    animating = true;
    animateLeaf(leaf,
      {innerHTML:''}, {innerHTML:''}, // no-op setters, content already loaded
      leaf.querySelector ? '' : '', '', curDeg, target, foldShadow, Math.max(180, Math.abs(target-curDeg)*3), ()=>{
        leaf.classList.remove('show');
        leaf.style.transform='rotateY(0deg)';
        leaf.style.setProperty('--shade','0');
        foldShadow.style.opacity = 0;
        if(commit){
          idx += dir==='next' ? pageStep() : -pageStep();
          renderStatic();
        }
        animating = false;
      });
  });
}
setupDrag('dragRight', leafNext, 'next');
setupDrag('dragLeft', leafPrev, 'prev');

/* ============ TOC ============ */
function renderTOC(){
  const list = document.getElementById('tocList');
  list.innerHTML = CH_META.map((m,i)=>{
    const chNum = i+1;
    return `<button class="toc-item ${idx===chapterStartIndex[chNum] || idx+1===chapterStartIndex[chNum] ? 'current':''}" data-ch="${chNum}">
      <span class="n">${String(chNum).padStart(2,'0')}</span>
      <span class="t">${m.t}</span>
      <span class="r">${m.time}</span>
    </button>`;
  }).join('');
  list.querySelectorAll('.toc-item').forEach(btn=>{
    btn.onclick = ()=>{ jumpTo(chapterStartIndex[+btn.dataset.ch]); closeAllPanels(); };
  });
}

function togglePanel(id, btnId){
  const panel = document.getElementById(id);
  const willOpen = !panel.classList.contains('open');
  closeAllPanels();
  if(willOpen){ panel.classList.add('open'); document.getElementById(btnId)?.setAttribute('aria-expanded','true'); }
}
function closeAllPanels(){
  ['tocPanel','searchPanel','bmPanel'].forEach(id=>document.getElementById(id).classList.remove('open'));
  document.getElementById('tocBtn').setAttribute('aria-expanded','false');
}
document.getElementById('tocBtn').onclick = ()=>togglePanel('tocPanel','tocBtn');
document.getElementById('searchBtn').onclick = ()=>{ togglePanel('searchPanel'); document.getElementById('searchInput').focus(); };
document.getElementById('bmBtn').onclick = ()=>{ renderBookmarks(); togglePanel('bmPanel'); };

/* ============ SEARCH ============ */
document.getElementById('searchInput').addEventListener('keydown', e=>{
  if(e.key !== 'Enter') return;
  const q = e.target.value.trim().toLowerCase();
  const res = document.getElementById('searchResult');
  if(!q){ res.textContent=''; return; }
  const found = pages.findIndex(p=>p.search && p.search.includes(q));
  if(found>=0){ res.textContent = `Found on page ${found+1} — jumping there.`; jumpTo(found); setTimeout(closeAllPanels, 500); }
  else res.textContent = 'No matches yet — that chapter may still be in progress.';
});

/* ============ BOOKMARKS ============ */
function renderBookmarks(){
  const list = document.getElementById('bmList');
  if(bookmarks.size===0){ list.innerHTML = '<div class="bm-empty">No bookmarks yet — tap the bookmark icon on any spread to save it.</div>'; return; }
  list.innerHTML = [...bookmarks].sort((a,b)=>a-b).map(pi=>{
    return `<button class="toc-item" data-p="${pi}"><span class="n">•</span><span class="t">Page ${pi+1}</span></button>`;
  }).join('');
  list.querySelectorAll('[data-p]').forEach(btn=>{
    btn.onclick = ()=>{ jumpTo(+btn.dataset.p); closeAllPanels(); };
  });
}
document.getElementById('bmBtn').addEventListener('dblclick', ()=>{
  if(bookmarks.has(idx)) bookmarks.delete(idx); else bookmarks.add(idx);
  showToast(bookmarks.has(idx) ? 'Bookmarked this spread' : 'Bookmark removed');
  renderBookmarks();
});

/* ============ DARK MODE ============ */
document.getElementById('darkBtn').onclick = ()=>{
  document.body.classList.toggle('dark');
  document.getElementById('darkBtn').classList.toggle('active');
};

/* ============ DOWNLOAD / SHARE ============ */
document.getElementById('dlBtn').onclick = ()=> window.print();
document.getElementById('shareBtn').onclick = async ()=>{
  const url = location.href;
  if(navigator.share){ try{ await navigator.share({title:'The Forgestack Book', url}); }catch(e){} }
  else { try{ await navigator.clipboard.writeText(url); showToast('Link copied'); }catch(e){ showToast('Copy this page\'s URL to share'); } }
};

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ============ COVER → LIBRARY ============ */
function openBook(){
  const cover = document.getElementById('coverEl');
  cover.classList.add('opening');
  setTimeout(()=>{
    document.getElementById('coverScene').classList.add('hidden');
    document.getElementById('library').classList.add('visible');
    renderStatic();
  }, 900);
}
document.getElementById('openBtn').onclick = openBook;
document.getElementById('coverEl').onclick = openBook;
document.getElementById('coverEl').addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' ') openBook(); });

/* ============ particles ============ */
(function(){
  const box = document.getElementById('particles');
  for(let i=0;i<16;i++){
    const s = document.createElement('span');
    s.style.left = Math.random()*100+'vw';
    s.style.animationDelay = (Math.random()*18)+'s';
    s.style.animationDuration = (14+Math.random()*10)+'s';
    box.appendChild(s);
  }
})();

window.addEventListener('resize', ()=>{ if(document.getElementById('library').classList.contains('visible')) renderStatic(); });
</script>
